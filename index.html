<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>maikou</title>
    <meta name="description" content="portfolio" />
    <meta name="author" content="SitePoint" />
    <meta name="viewport" content="width=device-width" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://use.fontawesome.com/releases/v5.6.1/css/all.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container fv">
      <!-- ハンバーガーメニュー -->
      <div class="l-hamburger" id="hamburger-outer"></div>
      <!-- サイドバー -->
      <div class="l-sidebar" id="sidebar-outer"></div>
      <!-- メインビジュアル -->
      <div class="main">
        <video
          class="mainvisual"
          autoplay
          muted
          playsinline
          webkit-playsinline
          preload="auto"
        >
          <source src="assets/img/mv/mv-back.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="mv-logo-right">
        <img
          src="assets/img/maikaanno.svg"
          alt="maika anno"
          class="maikaanno"
        />
      </div>
      <audio id="oseji-audio" preload="auto">
        <source src="assets/sounds/oseji.mp3" type="audio/mpeg" />
      </audio>
      <div class="sns">
        <a
          href="https://www.instagram.com/maikou804/"
          target="_blank"
          rel="noopener noreferrer"
          ><img
            src="assets/img/sns/sns-Instagram.svg"
            alt="instagram"
            class="instagram"
        /></a>
        <a
          href="https://maikou.hateblo.jp/"
          target="_blank"
          rel="noopener noreferrer"
          ><img
            src="assets/img/sns/sns-hatenablog.png"
            alt="はてなブログ"
            class="hatenablog"
        /></a>
        <a
          href="https://note.com/maikou1994/"
          target="_blank"
          rel="noopener noreferrer"
          ><img src="assets/img/sns/sns-note.svg" alt="note" class="note"
        /></a>
        <a
          href="https://kakuyomu.jp/users/maikou94"
          target="_blank"
          rel="noopener noreferrer"
          ><img
            src="assets/img/sns/sns-kakuyomu.png"
            alt="カクヨム"
            class="kakuyomu"
        /></a>
        <a
          href="https://podcast.example.com/maikou"
          target="_blank"
          rel="noopener noreferrer"
          ><img src="assets/img/sns/sns-podcast.png" alt="Podcast" class="podcast"
        /></a>
        <a
          href="https://www.youtube.com/@tamaranzakarecord"
          target="_blank"
          rel="noopener noreferrer"
          ><img src="assets/img/sns/sns-youtube.png" alt="YouTube" class="youtube"
        /></a>
      </div>
    </div>
    <!-- jQueryのCDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="assets/js/hamburger.js"></script>
    <!-- ハンバーガーメニューのインクルード -->
    <script>
      $(function () {
        $("#hamburger-outer").load("/hamburger.html #hamburger-inner");
      });
    </script>
    <!-- サイドバーのインクルード -->
    <script>
      $(function () {
        $("#sidebar-outer").load("/sidebar.html #sidebar-inner");
      });
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const mainvisualVideo = document.querySelector("video.mainvisual");
        const logo = document.querySelector(".maikaanno");
        const audio = document.getElementById("oseji-audio");

        if (mainvisualVideo) {
          mainvisualVideo.muted = true;
          mainvisualVideo.defaultMuted = true;
          mainvisualVideo.preload = "auto";

          const loopStartTime = 0.08;
          let manualLoopEnabled = false;

          const tryPlayVideo = function () {
            mainvisualVideo.play().catch(function () {});
          };

          const enableSeamlessLoop = function () {
            if (manualLoopEnabled) return;
            manualLoopEnabled = true;

            mainvisualVideo.addEventListener("timeupdate", function () {
              if (!Number.isFinite(mainvisualVideo.duration)) return;
              if (
                mainvisualVideo.duration - mainvisualVideo.currentTime <=
                0.03
              ) {
                mainvisualVideo.currentTime = loopStartTime;
                tryPlayVideo();
              }
            });
          };

          const hydrateVideoByBlob = function () {
            const sourceElement = mainvisualVideo.querySelector("source");
            const sourceUrl = sourceElement
              ? sourceElement.src
              : mainvisualVideo.currentSrc;
            if (!sourceUrl) return;

            fetch(sourceUrl)
              .then(function (response) {
                if (!response.ok) throw new Error("video fetch failed");
                return response.blob();
              })
              .then(function (blob) {
                const blobUrl = URL.createObjectURL(blob);
                mainvisualVideo.src = blobUrl;
                mainvisualVideo.load();
                enableSeamlessLoop();
                tryPlayVideo();
              })
              .catch(function () {
                mainvisualVideo.load();
                enableSeamlessLoop();
                tryPlayVideo();
              });
          };

          hydrateVideoByBlob();

          if (mainvisualVideo.readyState >= 2) {
            tryPlayVideo();
          } else {
            mainvisualVideo.addEventListener("loadeddata", tryPlayVideo, {
              once: true,
            });
          }

          document.addEventListener("click", tryPlayVideo, { once: true });
        }

        if (!logo || !audio) return;

        logo.addEventListener("click", function () {
          if (!audio.paused) {
            audio.pause();
            audio.currentTime = 0;
            return;
          }

          audio.currentTime = 0;
          audio.play();
        });
      });
    </script>
  </body>
</html>
