<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>maikou</title>
  <meta name="description" content="portfolio">
  <meta name="author" content="SitePoint">
  <link rel="stylesheet" href="style.css?v=20260225">
  <link href="https://use.fontawesome.com/releases/v5.6.1/css/all.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- ハンバーガーメニュー -->
    <div class="l-hamburger" id="hamburger-outer">
    </div>
    <!-- サイドバー -->
    <div class="l-sidebar" id="sidebar-outer">
    </div>
    <!-- メイン -->
    <div class="main-wrapper">
      <div class="contact-form">
        <h1>CONTACT</h1>
        <form action="" method="post" class="form-container">
          <div class="form-group">
            <label for="name">Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" required>
          </div>
          
          <div class="form-group">
            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" name="email" required>
          </div>
          
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject">
          </div>
          
          <div class="form-group">
            <label for="message">Message <span class="required">*</span></label>
            <textarea id="message" name="message" rows="8" required></textarea>
          </div>
          
          <button type="submit" class="submit-btn">SEND</button>
        </form>
      </div>
    </div>
  </div>
  <!-- jQueryのCDN -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>  
  <script src="assets/js/hamburger.js"></script>
  <!-- ハンバーガーメニューのインクルード -->
  <script>
    $(function() {
        $("#hamburger-outer").load("/hamburger.html #hamburger-inner");
    });
  </script>
  <!-- サイドバーのインクルード -->
  <script>
    $(function() {
        $("#sidebar-outer").load("/sidebar.html #sidebar-inner");
    });
  </script>
</body>
</html>
