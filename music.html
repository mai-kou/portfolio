    <!-- jQueryのCDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="assets/js/hamburger.js"></script>
    <script>
      $(function () {
        $(".music-works--coming-soon a").on("click", function (e) {
          e.preventDefault();
          var $msg = $(this).find(".music-coming-soon");
          $msg.addClass("is-visible");
          setTimeout(function () {
            $msg.removeClass("is-visible");
          }, 5000);
        });

        $("a[data-audio]")
          .on("mouseenter", function () {
            const audioSrc = $(this).data("audio");
            let audio = $(this).data("audioEl");
            if (!audio) {
              audio = new Audio(audioSrc);
              audio.volume = 0.2;
              $(this).data("audioEl", audio);
            }
            audio.currentTime = 0;
            audio.play().catch(function () {});
          })
          .on("mouseleave", function () {
            const audio = $(this).data("audioEl");
            if (audio) {
              audio.pause();
              audio.currentTime = 0;
            }
          });
      });
    </script>
