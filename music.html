    <script>
      $(function () {
        $("a[data-audio]")
          .on("mouseenter", function () {
            const audioSrc = $(this).data("audio");
            let audio = $(this).data("audioEl");
            if (!audio) {
              audio = new Audio(audioSrc);
              audio.volume = 0.2;
              $(this).data("audioEl", audio);
            }
            audio.currentTime = 0;
            audio.play().catch(function () {});
          })
          .on("mouseleave", function () {
            const audio = $(this).data("audioEl");
            if (audio) {
              audio.pause();
              audio.currentTime = 0;
            }
          });
      });
    </script>
