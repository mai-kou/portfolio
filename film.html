  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>

  <script>
    // GIFホバー制御
    $(document).ready(function() {
      $('.film-gif').on('mouseenter', function() {
        var gifSrc = $(this).data('gif');
        $(this).attr('src', gifSrc);
      }).on('mouseleave', function() {
        var staticSrc = $(this).data('static');
        $(this).attr('src', staticSrc);
      });

      // WebMホバー制御（常時再生・hover時に表示）
      $('.film-webm').each(function() {
        this.play().catch(function(){});
      });
      $('a:has(.film-thumb)').on('mouseenter', function() {
        $(this).find('.film-webm').show();
      }).on('mouseleave', function() {
        $(this).find('.film-webm').hide();
      });
    });
  </script>
